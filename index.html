<!DOCTYPE html>
<html>
<head>
  <title>Hamtaro Chatroom 🐹</title>
  <style>
    /* --- 🎨 核心視覺風格 --- */
    body { cursor: default; font-family: "Microsoft JhengHei", sans-serif; background: #FFB74D; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
    #messenger { display: flex; width: 750px; height: 500px; background: #FFF3E0; border: 4px solid #F57C00; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; position: relative; }
    
    /* 左側人員名單樣式 */
    #left-panel { width: 210px; background: #FFE0B2; border-right: 2px solid #F57C00; padding: 15px; display: flex; flex-direction: column; }
    #user-list { list-style: none; padding: 0; flex: 1; overflow-y: auto; }
    
    .user-item { display: flex; align-items: center; margin-bottom: 15px; padding: 8px; border-radius: 10px; transition: 0.2s; }
    .user-item:hover { background: rgba(255,255,255,0.4); }
    
    .user-avatar { width: 48px; height: 48px; border-radius: 50%; margin-right: 12px; background: #FFF; border: 1.5px solid #F57C00; object-fit: cover; flex-shrink: 0; }
    
    .user-info { display: flex; flex-direction: column; justify-content: center; line-height: 1.3; overflow: hidden; }
    .user-name-box { font-weight: bold; font-size: 14px; color: #333; display: flex; align-items: center; }
    .user-mood-text { font-size: 11px; color: #FF9800; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 🟢 狀態點點樣式 */
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
    .online { background: #4CAF50; } 
    .busy { background: #FFC107; } 
    .away { background: #9E9E9E; }

    /* 右側聊天面板樣 style */
    #chat-panel { flex: 1; padding: 10px; display: flex; flex-direction: column; background: white; }
    .title-bar { background: linear-gradient(to bottom, #FFB74D 0%, #F57C00 100%); color: white; padding: 8px; margin: -10px -10px 10px -10px; font-weight: bold; text-align: center; }
    #messages { flex: 1; overflow-y: auto; background: white; border: 2px solid #FFCC80; border-radius: 10px; padding: 10px; list-style: none; margin-bottom: 8px; }
    #messages li { font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #333; word-break: break-all; }
    
    .controls { display: flex; gap: 15px; align-items: center; background: #FFF9C4; padding: 5px 12px; border-radius: 20px; border: 1px solid #FBC02D; margin-bottom: 8px; }
    #input { flex:1; border-radius:20px; border:2px solid #F57C00; padding:8px 15px; outline:none; font-family: 'Microsoft JhengHei'; font-size: 13px; }
    .ham-btn { background: #F57C00; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #E65100; transition: 0.1s; outline: none; }
    .ham-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #E65100; }
    
       /* 🎨 彈窗視覺優化：告別突兀黑字 */
    .modal-overlay { 
      position: absolute; top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(0,0,0,0.3); /* 遮罩調淡 */
      display: none; justify-content: center; align-items: center; z-index: 2000; 
      backdrop-filter: blur(2px); /* 增加背景模糊，更有質感 */
    }
    
    .ham-modal { 
      background: #FFF9F0; /* 改為暖米白色 */
      border: 6px solid #F57C00; 
      border-radius: 30px; 
      padding: 25px; 
      text-align: center; 
      width: 300px; 
      box-shadow: 0 12px 30px rgba(230, 81, 0, 0.2); 
      color: #8D4E12; /* ✨ 關鍵：把黑字改為「深可可色」，視覺更溫柔 */
    }

    .modal-input { 
      width: 90%; padding: 10px; margin: 10px 0; 
      border: 2px solid #FFCC80; 
      border-radius: 12px; 
      outline: none; 
      color: #8D4E12; /* 輸入文字也同步改色 */
      background: white;
      text-align: center;
      font-weight: bold;
    }

    canvas { background: #FFE0B2; border: 2px solid #F57C00; border-radius: 10px; cursor: none; }
    .ding-style { color: #A52A2A !important; font-style: italic; font-weight: bold; }
    .chat-img { max-width: 200px; max-height: 200px; border-radius: 10px; border: 2px solid #FFCC80; margin-top: 5px; display: block; }
    @keyframes shake { 0%,100% {transform: translate(0,0)} 20% {transform: translate(-3px,0)} 60% {transform: translate(3px,0)} }
    .shake { animation: shake 0.2s 2; }
  </style>
</head>
<body>

<div id="messenger">
  <!-- 左側名單 -->
  <div id="left-panel">
    <strong style="color:#E65100; font-size:14px; margin-bottom:10px;">🐹 Online Friends</strong>
    <ul id="user-list"></ul>
    <div style="font-size:10px; color:#F57C00; margin-top:auto; padding-top:10px; border-top:1px dashed #F57C00;">Double-click yourself to edit!</div>
  </div>

  <!-- 右側對話 -->
  <div id="chat-panel">
    <div class="title-bar">🏠 Hamtaro Chatroom (Hecke!)</div>
    <ul id="messages"></ul>
    <div class="controls">
      <label style="cursor:pointer; font-size:18px;">🎨<input type="color" id="colorPicker" value="#000000" style="opacity:0; width:0;"></label>
      <button onclick="sendDing()" style="background:none; border:none; cursor:pointer; font-size:20px;">🔔</button>
      <button onclick="openGame()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌻</button>
      <label style="cursor:pointer; font-size:20px;">🖼️<input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="sendImage(this)"></label>
    </div>
    <form id="form" style="display:flex; gap:5px;">
      <input id="input" autocomplete="off" placeholder="Say something..." >
      <button class="ham-btn" type="submit">Send</button>
    </form>
  </div>
  
  <!-- 彈窗 -->
  <div id="custom-modal" class="modal-overlay">
    <div class="ham-modal">
        <h2 id="modal-title" style="color:#F57C00; margin-top:0;">Hamtaro says...</h2>
        <div id="modal-content" style="margin: 15px 0;"></div>
        <div id="modal-footer" style="margin-top:20px;"></div>
    </div>
  </div>

  <!-- 遊戲視窗 -->
  <div id="game-overlay" class="modal-overlay">
    <div class="ham-modal" style="width:auto; background:#FFF3E0;">
        <h3 style="color:#F57C00; margin: 0 0 10px 0;">🌻 Sunflower Catch!</h3>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <br><button class="ham-btn" onclick="closeGame()">放棄</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const defaultPic = "https://i.imgur.com";

  // --- 💾 資料管理 ---
  function saveUser(u) { localStorage.setItem("hamtaroUser", JSON.stringify(u)); }
  function getUser() { return JSON.parse(localStorage.getItem("hamtaroUser")); }
  function saveToLocal(d) {
    let history = JSON.parse(localStorage.getItem("hamHistory")) || [];
    history.push(d);
    if(history.length > 50) history.shift();
    localStorage.setItem("hamHistory", JSON.stringify(history));
  }

  // --- 🎨 初始化設定 (包含顏色記憶) ---
  let myData = getUser() || { name: "", avatar: defaultPic, status: "Hecke!", mode: 'online', color: "#000000" };

  function displayMsg(d, isHistory = false) {
    const li = document.createElement('li');
    if(d.type === 'ding') {
        if(!isHistory) {
          document.getElementById('messenger').classList.add('shake');
          setTimeout(()=> document.getElementById('messenger').classList.remove('shake'), 500);
        }
        li.className = "ding-style";
        li.innerHTML = `🔔 ${d.user}: 叮咚，有人在家嗎～～～`;
    } else if(d.image) {
        li.innerHTML = `<strong>${d.user}</strong>: <br><img src="${d.image}" class="chat-img">`;
    } else {
        li.style.color = d.color || "#000000";
        li.innerHTML = `<strong>${d.user}</strong>: ${d.text}`;
    }
    document.getElementById('messages').appendChild(li);
    document.getElementById('messages').scrollTop = 9999;
  }

  // --- 🚀 初始化與登入 ---
  window.onload = () => {
    const history = JSON.parse(localStorage.getItem("hamHistory")) || [];
    history.forEach(d => displayMsg(d, true));
    
    if (myData.color) document.getElementById('colorPicker').value = myData.color;

    if (myData.name) {
      socket.emit('login', myData);
    } else {
      hamShow("Welcome!", `<input class="modal-input" id="n-in" placeholder="Nickname">`, "Enter", () => {
        myData.name = document.getElementById('n-in').value || "Ham-Ham";
        myData.color = document.getElementById('colorPicker').value;
        saveUser(myData);
        socket.emit('login', myData);
      });
    }
  };

  // --- 📡 Socket 監聽 ---
  socket.on('chat message', d => { displayMsg(d); saveToLocal(d); });

  // --- 🚀 這是 index.html 的 183 到 225 行，請直接整塊覆蓋 ---
  socket.on('user list', (users) => {
    const list = document.getElementById('user-list');
    list.innerHTML = ''; // 1. 先清空舊名單
    
    users.forEach(u => {
      const isMe = (u.id === socket.id);
      const li = document.createElement('li');
      li.className = 'user-item' + (isMe ? ' me' : '');
      
      // 畫出頭像、狀態點點、暱稱與心情
      li.innerHTML = `
        <img src="${u.avatar || defaultPic}" class="user-avatar">
        <div class="user-info">
          <div class="user-name-box">
            <span class="status-dot ${u.mode || 'online'}"></span>${u.name}
          </div>
          <div class="user-mood-text">${u.status || 'Hecke!'}</div>
        </div>`;

      if (isMe) {
        li.style.cursor = "pointer";
        li.ondblclick = () => {
          hamShow("編輯個人資料 🐹", `
            <div style="text-align:left; font-size:13px; color:#8D4E12;">
              暱稱：<input class="modal-input" id="e-name" value="${myData.name}">
              頭貼：<input class="modal-input" id="e-avatar" value="${myData.avatar}">
              心情：<input class="modal-input" id="e-status" value="${myData.status}">
              狀態：<select class="modal-input" id="e-mode">
                <option value="online" ${myData.mode === 'online' ? 'selected' : ''}>🟢 上線中</option>
                <option value="busy" ${myData.mode === 'busy' ? 'selected' : ''}>🟠 忙線中</option>
                <option value="away" ${myData.mode === 'away' ? 'selected' : ''}>⚪ 閒置中</option>
              </select>
            </div>`, "儲存", () => {
              // 2. 儲存新資料到本地
              myData.name = document.getElementById('e-name').value || myData.name;
              myData.avatar = document.getElementById('e-avatar').value || myData.avatar;
              myData.status = document.getElementById('e-status').value || "Hecke!";
              myData.mode = document.getElementById('e-mode').value;
              saveUser(myData);
              
              // 3. 🎯 這裡用 'update user' 就不會跳通知
              socket.emit('update user', myData); 
          });
        };
      }
      list.appendChild(li); // 4. ✅ 確保這行在迴圈內，名單才會立刻刷新
    });
  });




  // --- 📩 傳送邏輯 ---
  document.getElementById('form').onsubmit = (e) => {
    e.preventDefault();
    const input = document.getElementById('input');
    const color = document.getElementById('colorPicker').value;
    if (input.value) {
      myData.color = color;
      saveUser(myData);
      socket.emit('chat message', { user: myData.name, text: input.value, color: color });
      input.value = '';
    }
  };

  function sendDing() { socket.emit('chat message', { user: myData.name, type: 'ding' }); }
  function sendImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = (e) => socket.emit('chat message', { user: myData.name, image: e.target.result });
      reader.readAsDataURL(input.files[0]);
    }
  }

  // --- 🎨 彈窗功能 ---
  function hamShow(title, contentHTML, btnText, callback) {
    const modal = document.getElementById('custom-modal');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-content').innerHTML = contentHTML;
    document.getElementById('modal-footer').innerHTML = `<button class="ham-btn" id="modal-ok-btn">${btnText}</button>`;
    modal.style.display = 'flex';
    document.getElementById('modal-ok-btn').onclick = () => {
        if(callback) callback();
        modal.style.display = 'none';
    };
  }

  // --- 🌻 遊戲邏輯 ---
  let gameActive = false;
  function openGame() { document.getElementById('game-overlay').style.display = 'flex'; gameActive = true; startGame(); }
  function closeGame() { document.getElementById('game-overlay').style.display = 'none'; gameActive = false; }
  function startGame() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0, hamX = 150;
    let item = { x: Math.random()*280, y: 0, type: '🌻' };
    canvas.onmousemove = (e) => {
      const rect = canvas.getBoundingClientRect();
      hamX = e.clientX - rect.left;
    };
    function loop() {
      if(!gameActive) return;
      ctx.clearRect(0,0,300,300);
      ctx.font = "30px Arial"; ctx.fillText("🐹", hamX-15, 280);
      ctx.fillText(item.type, item.x, item.y);
      item.y += (3 + score * 0.1); 
      if(item.y > 300) { 
        if (item.type === '🌻') { doGameOver(`沒吃到向日葵種子！🌻`, score); return; } else { resetItem(); }
      }
      if(item.y > 250 && Math.abs(item.x - (hamX-15)) < 30) { 
        if (item.type === '🍜') { doGameOver(`吃到拉麵燙到了！🍜`, score); return; } else { score++; resetItem(); }
      }
      ctx.font = "16px Arial"; ctx.fillStyle="#F57C00"; ctx.fillText("Score: "+score, 10, 20);
      requestAnimationFrame(loop);
    }
    function resetItem() { item.y = 0; item.x = Math.random()*280; item.type = Math.random() > 0.3 ? '🌻' : '🍜'; }
    function doGameOver(reason, finalScore) {
      gameActive = false;
      closeGame();
      hamShow("Game Over!", `${reason}<br>最終得分: ${finalScore}`, "Okay", () => {
        socket.emit('chat message', { user: myData.name, text: `🌻 接向日葵戰報 : 我得到了 ${finalScore} 分 !`, color: "#F57C00" });
      });
    }
    loop();
  }
</script>
</body>
</html>
